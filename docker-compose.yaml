name: perf

volumes:
  pgdata:
  promdata:
  tgzdata:

services:

## ------------------------------------------------
## Postgres 
## ------------------------------------------------
  postgres:
    container_name: perf-postgres
    image: postgres:18
    pull_policy: always
    command: postgres -c config_file=/postgres.conf
    ports:
      - "13020:5432"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 30G
    environment:
      PGDATA: /data/pg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: pg_isready -U postgres
      interval: 3s
      start_period: 10s
    volumes:
      - pgdata:/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./infra/postgres/postgres.conf:/postgres.conf

## ------------------------------------------------
## FHIR Servers
## ------------------------------------------------

## ------------------------------------------------
## Aidbox 
## ------------------------------------------------
  aidbox:
    container_name: perf-aidbox
    image: healthsamurai/aidboxone:edge
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 20G
    volumes:
      - ./infra/aidbox/initbundle.json:/tmp/initbundle.json
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=80 -XshowSettings:vm"
      BOX_ADMIN_PASSWORD: secret
      BOX_CACHE_REPLICATION_DISABLE: true
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_DB_DATABASE: aidbox
      BOX_DB_HOST: postgres
      BOX_DB_PASSWORD: postgres
      BOX_DB_USER: postgres
      BOX_WEB_THREAD: 16
      BOX_DB_POOL_MAXIMUM__POOL__SIZE: 32
      BOX_FHIR_COMPLIANT_MODE: true
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: true
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_SCHEMA_VALIDATION: true
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: true
      BOX_FHIR_SEARCH_COMPARISONS: true
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_METRICS_PORT: 8379
      BOX_INIT_BUNDLE: file:///tmp/initbundle.json
      BOX_ROOT_CLIENT_SECRET: secret
      BOX_SEARCH_INCLUDE_CONFORMANT: true
      BOX_SECURITY_DEV_MODE: true
      BOX_SETTINGS_MODE: read-write
      BOX_WEB_BASE_URL: http://localhost:8080
      BOX_WEB_MAX_BODY: 209715200
      BOX_WEB_PORT: 8080
      BOX_FHIR_SEARCH_DEFAULT_PARAMS_TOTAL: none
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 30s
      start_period: 30s
      retries: 10
    ports:
      - "13080:8080"

## ------------------------------------------------
## HAPI FHIR
## ------------------------------------------------
  hapi:
    container_name: perf-hapi
    image: hapiproject/hapi:latest
    pull_policy: always
    entrypoint:
      - java
      - -XX:MaxRAMPercentage=80
      - -XshowSettings:vm
      - --class-path
      - /app/main.war
      - -Dloader.path=main.war!/WEB-INF/classes/,main.war!/WEB-INF/,/app/extra-classes
      - org.springframework.boot.loader.PropertiesLauncher
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 20G
    ports:
      - "13090:8080"
    volumes:
      - ./infra/hapi/application.yaml:/app/config/application.yaml:ro

  hapi-checker:
    container_name: perf-hapi-hc
    image: curlimages/curl
    command: ["-c", "trap : TERM INT; sleep infinity & wait"]
    depends_on:
      hapi:
        condition: service_started
    entrypoint: /bin/sh
    healthcheck:
      test: curl -f http://hapi:8080/actuator/health/readiness
      interval: 10s
      start_period: 30s
      retries: 10

  octofhir:
    container_name: perf-octofhir
    image: ghcr.io/octofhir/octofhir-server:latest
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 20G
    environment:
      OCTOFHIR__SERVER__HOST: "0.0.0.0"
      OCTOFHIR__SERVER__PORT: "8888"
      OCTOFHIR__SERVER__BASE_URL: "http://octofhir:8888"
      OCTOFHIR__SERVER__BODY_LIMIT_BYTES: "104857600"
      OCTOFHIR__STORAGE__POSTGRES__HOST: postgres
      OCTOFHIR__STORAGE__POSTGRES__PORT: "5432"
      OCTOFHIR__STORAGE__POSTGRES__USER: postgres
      OCTOFHIR__STORAGE__POSTGRES__PASSWORD: postgres
      OCTOFHIR__STORAGE__POSTGRES__DATABASE: octofhir
      OCTOFHIR__STORAGE__POSTGRES__POOL_SIZE: "32"
      OCTOFHIR__AUTH__POLICY__ANONYMOUS_ACCESS: "true"
      OCTOFHIR__AUTH__POLICY__DEFAULT_DENY: "false"
      OCTOFHIR__AUDIT__ENABLED: "false"
      OCTOFHIR__LOGGING__LEVEL: "info"
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8888/healthz || exit 1"]
      interval: 10s
      start_period: 60s
      retries: 30
    ports:
      - "13100:8888"

## ------------------------------------------------
## Medplum 
## ------------------------------------------------
  medplum:
    image: medplum/medplum-server:latest
    pull_policy: always
    command:
      - file:/srv/config.json
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'
          memory: 3G
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
    volumes:
      - ./infra/medplum:/srv
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          'fetch("http://localhost:8103/healthcheck").then(r => r.json()).then(console.log).catch(() => { process.exit(1); })',
        ]
      interval: 10s
      timeout: 1s
      retries: 10

  redis:
    container_name: perf-redis
    image: redis:latest
    pull_policy: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      start_period: 10s
      timeout: 5s
      retries: 5

## ------------------------------------------------
## K6 test runner and tgz service fo import tests
## ------------------------------------------------
  k6:
    container_name: perf-k6
    image: grafana/k6
    pull_policy: always
    depends_on:
      aidbox:
        condition: service_healthy
      medplum:
        condition: service_healthy
      hapi-checker:
        condition: service_healthy
      octofhir:
        condition: service_healthy
    profiles:
      - donotstart
    volumes:
      - ./k6:/k6
      - ./runner.sh:/runner.sh:ro

  tgz:
    container_name: perf-tgz
    build:
      context: infra/tgz
    command:
      - "https://storage.googleapis.com/aidbox-public/synthea/performance/bulk_1k.tar.gz"
    volumes:
      - tgzdata:/data
    working_dir: /data

## ------------------------------------------------
## Monitoring stack
## ------------------------------------------------
  prometheus:
    container_name: perf-prometheus
    image: prom/prometheus
    pull_policy: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=native-histograms
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    healthcheck:
      test: wget -O - http://localhost:9090/-/ready
      interval: 5s
      start_period: 5s
    ports:
      - "13010:9090"
    volumes:
      - promdata:/prometheus
      - ./infra/prometheus/config.yaml:/etc/prometheus/prometheus.yml

  grafana:
    container_name: perf-grafana
    image: grafana/grafana-oss
    pull_policy: always
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_BASIC_ENABLED: false
    healthcheck:
      test: curl http://localhost:3000/api/health
      interval: 5s
      start_period: 30s
    ports:
      - "13000:3000"
    volumes:
      - ./infra/grafana:/etc/grafana/provisioning:ro

  cadvisor:
    container_name: perf-cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    pull_policy: always
    privileged: true
    command:
      - --containerd=/var/run/docker/containerd/containerd.sock
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  otel-collector:
    container_name: perf-otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    pull_policy: always
    command:
      - --config=/etc/otel/config.yaml
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro

  postgres-exporter:
    container_name: perf-postgres-exporter
    image: quay.io/prometheuscommunity/postgres-exporter
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_PASS: postgres
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
    healthcheck:
      test: wget -O - http://localhost:9187/metrics
      interval: 10s
      start_period: 10s
      timeout: 5s
      retries: 3