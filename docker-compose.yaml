networks:
  global:
    driver: bridge

volumes:
  pgdata:

services:
  aidbox:
    image: healthsamurai/aidboxone:edge
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    environment:
      BOX_ADMIN_PASSWORD: secret
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_DB_DATABASE: aidbox
      BOX_DB_HOST: postgres
      BOX_DB_PASSWORD: postgres
      BOX_DB_USER: postgres
      BOX_DB_POOL_MAXIMUM__POOL__SIZE: 16
      BOX_WEB_THREAD: 8
      BOX_FHIR_COMPLIANT_MODE: true
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: true
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_SCHEMA_VALIDATION: true
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: true
      BOX_FHIR_SEARCH_COMPARISONS: true
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_METRICS_PORT: 8379
      BOX_ROOT_CLIENT_SECRET: secret
      BOX_SEARCH_INCLUDE_CONFORMANT: true
      BOX_SECURITY_DEV_MODE: true
      BOX_SETTINGS_MODE: read-write
      BOX_WEB_BASE_URL: http://localhost:8080
      BOX_WEB_PORT: 8080
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 30s
      start_period: 30s
    networks:
      - global
    ports:
      - 8080:8080

  grafana:
    image: grafana/grafana-oss
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_BASIC_ENABLED: false
    healthcheck:
      test: curl http://localhost:3000/api/health
      interval: 5s
      start_period: 30s
    networks:
      - global
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/etc/grafana/provisioning:ro

  hapi:
    image: hapiproject/hapi:latest
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    networks:
      - global
    ports:
      - "8090:8080"
    volumes:
      - ./hapi/application.yaml:/app/config/application.yaml:ro
      - ./curl:/mnt:ro

  hapi-checker:
    image: curlimages/curl
    command: ["-c", "trap : TERM INT; sleep infinity & wait"]
    depends_on:
      hapi:
        condition: service_started
    entrypoint: /bin/sh
    healthcheck:
      test: curl -f http://hapi:8080/actuator/health/readiness
      interval: 10s
      start_period: 30s
    networks:
      - global

  readiness:
    image: bash
    command:
      - -c
      - echo -e "\n\nAll services are up and running\n\n"
    depends_on:
      aidbox:
        condition: service_healthy
      hapi-checker:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  k6:
    image: grafana/k6
    command:
      - -c
      - /run.sh
    depends_on:
      aidbox:
        condition: service_healthy
      hapi-checker:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    entrypoint: /bin/sh
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_STALE_MARKERS: true
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: true
    networks:
      - global
    profiles:
      - donotstart
    volumes:
      - ./run.sh:/run.sh:ro
      - ./test:/test
    working_dir: /test

  medplum:
    image: medplum/medplum-server
    command:
      - file:/srv/config.json
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - global
    ports:
      - "5000:5000"
      - "8103:8103"
    volumes:
      - ./medplum:/srv

  postgres:
    image: healthsamurai/aidboxdb:17
    command: postgres -c config_file=/postgres.conf
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: pg_isready -U postgres
      interval: 3s
      start_period: 10s
    networks:
      - global
    volumes:
      - pgdata:/var/lib/postgresql/data:delegated
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/postgres.conf:/postgres.conf

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: postgres
    networks:
      - global

  prometheus:
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=native-histograms
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    healthcheck:
      test: wget -O - http://localhost:9090/-/ready
      interval: 5s
      start_period: 5s
    networks:
      - global
    volumes:
      - ./prometheus/config.yaml:/etc/prometheus/prometheus.yml

  redis:
    image: redis
    networks:
      - global

