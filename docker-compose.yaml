  postgres:
    container_name: perf-postgres
    image: postgres:17
    command: postgres -c config_file=/postgres.conf
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: pg_isready -U postgres
      interval: 3s
      start_period: 10s
    networks:
      - global
    volumes:
      - pgdata:/var/lib/postgresql/data:delegated
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/postgres.conf:/postgres.conf

  postgres-exporter:
    container_name: perf-postgres-exporter
    image: quay.io/prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: postgres
    networks:
      - global

  prometheus:
    container_name: perf-prometheus
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=native-histograms
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: wget -O - http://localhost:9090/-/ready
      interval: 5s
      start_period: 5s
    networks:
      - global
    volumes:
      - promdata:/prometheus
      - ./prometheus/config.yaml:/etc/prometheus/prometheus.yml

  readiness:
    container_name: perf-readiness
    image: bash
    command:
      - -c
      - echo -e "\n\nAll services are up and running\n\n"
    depends_on:
      aidbox:
        condition: service_healthy
      hapi-checker:
        condition: service_healthy
      medplum-checker0:
        condition: service_healthy
      medplum-checker1:
        condition: service_healthy
      medplum-checker2:
        condition: service_healthy
      medplum-checker3:
        condition: service_healthy
      medplum-checker4:
        condition: service_healthy
      medplum-checker5:
        condition: service_healthy
      medplum-checker6:
        condition: service_healthy
      medplum-checker7:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tgz:
        condition: service_healthy

  redis:
    container_name: perf-redis
    image: redis
    networks:
      - global
    volumes:
      - redisdata:/data

  tgz:
    build:
      context: tgz
    command:
      - "https://storage.googleapis.com/aidbox-public/synthea/performance/bulk_1k.tar.gz"
    networks:
      - global
    ports:
      - "8081:8080"
    volumes:
      - tgzdata:/data
    working_dir: /data
