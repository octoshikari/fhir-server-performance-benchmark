networks:
  global:
    driver: bridge

volumes:
  pgdata:
  promdata:
  redisdata:
  tgzdata:

services:
  aidbox:
    container_name: perf-aidbox
    image: healthsamurai/aidboxone:edge
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    environment:
      BOX_ADMIN_PASSWORD: secret
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_DB_DATABASE: aidbox
      BOX_DB_HOST: postgres
      BOX_DB_PASSWORD: postgres
      BOX_DB_USER: postgres
      BOX_DB_POOL_MAXIMUM__POOL__SIZE: 16
      BOX_WEB_THREAD: 8
      BOX_FHIR_COMPLIANT_MODE: true
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: true
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_SCHEMA_VALIDATION: true
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: true
      BOX_FHIR_SEARCH_COMPARISONS: true
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_METRICS_PORT: 8379
      BOX_ROOT_CLIENT_SECRET: secret
      BOX_SEARCH_INCLUDE_CONFORMANT: true
      BOX_SECURITY_DEV_MODE: true
      BOX_SETTINGS_MODE: read-write
      BOX_WEB_BASE_URL: http://localhost:8080
      BOX_WEB_PORT: 8080
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XshowSettings:vm"
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 30s
      start_period: 30s
      retries: 10
    networks:
      - global
    ports:
      - "8080:8080"

  cadvisor:
    container_name: perf-cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    networks:
      - global
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  grafana:
    container_name: perf-grafana
    image: grafana/grafana-oss
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_BASIC_ENABLED: false
    healthcheck:
      test: curl http://localhost:3000/api/health
      interval: 5s
      start_period: 30s
    networks:
      - global
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/etc/grafana/provisioning:ro

  hapi:
    container_name: perf-hapi
    image: hapiproject/hapi:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    networks:
      - global
    ports:
      - "8090:8080"
    volumes:
      - ./hapi/application.yaml:/app/config/application.yaml:ro
      - ./curl:/mnt:ro

  hapi-checker:
    container_name: perf-hapi-check
    image: curlimages/curl
    command: ["-c", "trap : TERM INT; sleep infinity & wait"]
    depends_on:
      hapi:
        condition: service_started
    entrypoint: /bin/sh
    healthcheck:
      test: curl -f http://hapi:8080/actuator/health/readiness
      interval: 10s
      start_period: 30s
      retries: 10
    networks:
      - global

  k6:
    container_name: perf-k6
    image: grafana/k6
    depends_on:
      aidbox:
        condition: service_healthy
      hapi-checker:
        condition: service_healthy
      medplum-checker0:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tgz:
        condition: service_healthy
    entrypoint: /run.sh
    environment:
      BUNDLE_URL: http://tgz:8080
      CI: "${CI}"
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),p(99),min,max
    networks:
      - global
    profiles:
      - donotstart
    volumes:
      - ./run.sh:/run.sh:ro
      - ./test:/test
    working_dir: /test

  medplum:
    container_name: perf-medplum-proxy
    image: haproxy:3.0
    depends_on:
      medplum0:
        condition: service_started
      medplum1:
        condition: service_started
      medplum2:
        condition: service_started
      medplum3:
        condition: service_started
      medplum4:
        condition: service_started
      medplum5:
        condition: service_started
      medplum6:
        condition: service_started
      medplum7:
        condition: service_started
    networks:
      - global
    ports:
      - "8101:8101"
      - "8103:8103"
    volumes:
      - ./haproxy:/usr/local/etc/haproxy:ro

  medplum0:
    container_name: perf-medplum0
    image: medplum/medplum-server
    pull_policy: always
    command:
      - file:/srv/config.json
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 4G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - global
    volumes:
      - ./medplum:/srv

  medplum-checker0:
    container_name: perf-medplum-check0
    image: curlimages/curl
    command: ["-c", "trap : TERM INT; sleep infinity & wait"]
    depends_on:
      medplum0:
        condition: service_started
    entrypoint: /bin/sh
    healthcheck:
      test: curl -f http://medplum0:8103/healthcheck
      interval: 10s
      start_period: 30s
      retries: 10
    networks:
      - global

  medplum1:
    container_name: perf-medplum1
    image: medplum/medplum-server
