kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run

steps:
- name: configure
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
    VMAUTH:
      from_secret: VMAUTH
  commands:
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - |
    cat << EOF >> ifra/prometheus/config.yaml
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
    EOF

- name: test
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  environment:
    SSH_KEY:
      from_secret: SSH_KEY
  commands:
  - sleep 10 # give docker enough time to start
  - docker compose up --build -d
  - docker ps -a
  - sleep 10 # give docker compose services enough time to start
  # - docker compose run --name perf-k6 --rm k6
  # - sleep 120 # wait for finish remote write
  # - docker compose run --name perf-reporter --rm reporter
  # - docker compose run --name perf-update-report --rm update-report
  # - docker compose down -v
