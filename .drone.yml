kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}
- name: build
  temp: {}
- name: perf-cache-image
  host:
    path: /tmp/perf-test-image-cache
- name: perf-cache-overlay
  host:
    path: /tmp/perf-test-overlay-cache

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run
  - name: perf-cache-image
    path: /var/lib/docker/image
  - name: perf-cache-overlay
    path: /var/lib/docker/overlay2

steps:
- name: dind-ready
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  # Wait for Docker daemon to be ready.
  - |
    echo "Waiting for Docker daemon to start..."
    n=0
    until [ $n -ge 30 ] || docker info >/dev/null 2>&1; do
      n=$((n+1))
      echo "Attempt $n: Docker daemon not ready, waiting..."
      sleep 2
    done
    if [ $n -ge 30 ]; then
      echo "Docker daemon failed to start after 60 seconds"
      exit 1
    fi
    echo "Docker daemon is ready"

- name: configure
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
    VMAUTH:
      from_secret: VMAUTH
  commands:
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - |
    cat << EOF >> infra/prometheus/config.yaml
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
    EOF

- name: test
  depends_on:
  - configure
  - dind-ready
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  - name: build
    path: /tmp/workspace
  commands:

  ## Setup RUNID
  - export RUNID=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
  - echo $RUNID > /tmp/workspace/run-id

  ## Run infra
  - ./runner.sh bootstrap

  ## Prewarm
  # - ./runner.sh -t /k6/prewarm.js

  ## Run tests
  - ./runner.sh -t /k6/crud.js
  # - ./runner.sh -t /k6/import.js
  # - ./runner.sh -t /k6/search.js

  ## Wait metrics tail
  - sleep 100

  ## TODO: make all reports
  # - docker compose run --name perf-reporter --rm reporter
  # - docker compose run --name perf-update-report --rm update-report

  ## Cleanup
  - docker compose down -v

- name: snapshot
  environment:
    METRICS_URL: https://vm.cdr.aidbox.dev
    METRICS_USERNAME: vm
    METRICS_PASSWORD:
      from_secret: VMAUTH
  image: node:24-alpine
  depends_on:
  - test
  volumes:
  - name: build
    path: /tmp/workspace
  commands:
  - export RUNID=$(cat /tmp/workspace/run-id)
  - node scripts/generate-snapshot.js -o /tmp/workspace/reports

- name: upload-to-gcs
  environment:
    GOOGLE_APPLICATION_CREDENTIALS_JSON:
      from_secret: BUCKET_KEY
  image: google/cloud-sdk:alpine
  depends_on:
  - snapshot
  volumes:
  - name: build
    path: /tmp/workspace
  commands:
  - export RUNID=$(cat /tmp/workspace/run-id)
  - echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcs-key.json
  - gcloud auth activate-service-account --key-file=/tmp/gcs-key.json
  - gsutil -m cp -r /tmp/workspace/reports/SNAPSHOT_${RUNID}.json gs://samurai-public/fhir-server-performance-benchmark/
  - gsutil -m cp -r /tmp/workspace/reports/SOURCE_DATA_${RUNID}.json gs://samurai-public/fhir-server-performance-benchmark/
  - echo "Reports uploaded to GCS bucket samurai-public/fhir-server-performance-benchmark/"
  - rm /tmp/gcs-key.json