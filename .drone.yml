kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run

steps:
- name: activate-aidbox
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
  commands:
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - cat docker-compose.override.yml
- name: configure-vm
  image: alpine:latest
  environment:
    VMAUTH:
      from_secret: VMAUTH
  commands:
  - |
    cat >> prometheus/config.yaml << EOF
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      remote_timeout: 30s
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
      enable_http2: true
      queue_config:
        capacity: 2500
        max_shards: 200
        min_shards: 1
        max_samples_per_send: 500
        batch_send_deadline: 5s
        min_backoff: 30ms
        max_backoff: 5s
      metadata_config:
        send: true
        send_interval: 1m
        max_samples_per_send: 500
    EOF
  - cat prometheus/config.yaml

- name: test 
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  - sleep 10 # give docker enough time to start
  - docker compose up -d
  - docker ps -a
  - docker compose run --rm k6