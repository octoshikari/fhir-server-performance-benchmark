kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run

steps:
- name: test 
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  environment:
    LICENSE:
      from_secret: LICENSE
  commands:
  - sleep 10 # give docker enough time to start
  - docker compose up -d
  - docker ps -a
  - docker compose run --rm k6