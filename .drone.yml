kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  - |
    echo '{"metrics-addr": "127.0.0.0:9323"}' > /etc/docker/daemon.json
  - docker-entrypoint.sh

steps:
- name: activate-aidbox
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
  commands:
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - cat docker-compose.override.yml
- name: configure-vm
  image: alpine:latest
  environment:
    VMAUTH:
      from_secret: VMAUTH
  commands:
  - |
    cat << EOF >> prometheus/config.yaml
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
    EOF
  - cat prometheus/config.yaml

- name: test
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  - sleep 10 # give docker enough time to start
  - docker compose up -d
  - docker ps -a
  - docker compose run --rm k6
  - sleep 180 # wait for finish remote write
