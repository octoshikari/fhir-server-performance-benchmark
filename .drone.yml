kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}

services:
- name: docker
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run

steps:
- name: init dind
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  - sleep 5 # give docker enough time to start
  - docker compose up -d
  - docker ps -a
  - sleep 5 # give docker enough time to start