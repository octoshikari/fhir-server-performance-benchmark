kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

volumes:
- name: dockersock
  temp: {}
- name: perf-cache-image
  host:
    path: /tmp/perf-test-image-cache
- name: perf-cache-overlay
  host:
    path: /tmp/perf-test-overlay-cache

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run
  - name: perf-cache-image
    path: /var/lib/docker/image
  - name: perf-cache-overlay
    path: /var/lib/docker/overlay2

steps:
- name: dind-ready
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  # Wait for Docker daemon to be ready. 
  - |
    echo "Waiting for Docker daemon to start..."
    n=0
    until [ $n -ge 30 ] || docker info >/dev/null 2>&1; do
      n=$((n+1))
      echo "Attempt $n: Docker daemon not ready, waiting..."
      sleep 2
    done
    if [ $n -ge 30 ]; then
      echo "Docker daemon failed to start after 60 seconds"
      exit 1
    fi
    echo "Docker daemon is ready"

- name: configure
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
    VMAUTH:
      from_secret: VMAUTH
  commands:
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - |
    cat << EOF >> infra/prometheus/config.yaml
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
    EOF

- name: test
  depends_on:
  - configure
  - dind-ready
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  environment:
    # CI: true
    SSH_KEY:
      from_secret: SSH_KEY
  commands:
  ## Run infra
  - docker compose up --build -d 

  ## Wait until infra was ready
  - |
    n=0
    until [ $n -ge 5 ]
    do
      if docker compose up --wait; then
        echo "Services is ready"
        break
      fi
      n=$((n+1))
      echo "Attempt $n: Services not ready yet, retrying..."
      sleep 10
    done
    if [ $n -ge 5 ]; then
      echo "Services failed to start after 5 attempts"
      exit 1
    fi

  ## Setup RUNID
  - export RUNID=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

  ## Prewarm
  - ./runner.sh -t /k6/prewarm.js
  ## Run all tests
  - ./runner.sh -t /k6/search.js
  - ./runner.sh -t /k6/crud.js
  - ./runner.sh -t /k6/import.js

  ## Wait metrics tail
  - sleep 100

  ## TODO: make all reports
  # - docker compose run --name perf-reporter --rm reporter
  # - docker compose run --name perf-update-report --rm update-report

  ## Cleanup
  - docker compose down -v

