kind: pipeline
type: docker
name: benchmark
node:
  node: hz-cdr

trigger:
  event:
    exclude: [ promote ]

volumes:
- name: dockersock
  temp: {}
- name: build
  temp: {}
- name: perf-cache-image
  host:
    path: /tmp/perf-test-image-cache
- name: perf-cache-overlay
  host:
    path: /tmp/perf-test-overlay-cache
- name: search-dataset
  host:
    path: /var/data/storage/pgdata/perf-test-search
- name: zfs
  host:
    path: /tank

services:
- name: dind
  image: docker:dind
  privileged: true
  volumes:
  - name: dockersock
    path: /var/run
  - name: perf-cache-image
    path: /var/lib/docker/image
  - name: perf-cache-overlay
    path: /var/lib/docker/overlay2
  - name: search-dataset
    path: /var/lib/search-dataset
steps:
- name: dind-ready
  image: docker:dind
  volumes:
  - name: dockersock
    path: /var/run
  commands:
  # Wait for Docker daemon to be ready.
  - |
    echo "Waiting for Docker daemon to start..."
    n=0
    until [ $n -ge 30 ] || docker info >/dev/null 2>&1; do
      n=$((n+1))
      echo "Attempt $n: Docker daemon not ready, waiting..."
      sleep 2
    done
    if [ $n -ge 30 ]; then
      echo "Docker daemon failed to start after 60 seconds"
      exit 1
    fi
    echo "Docker daemon is ready"

- name: configure
  image: alpine:latest
  environment:
    LICENSE:
      from_secret: LICENSE
    VMAUTH:
      from_secret: VMAUTH
  volumes:
  - name: build
    path: /tmp/workspace
  commands:
  ## Setup RUNID
  - export RUNID=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
  - echo $RUNID > /tmp/workspace/run-id
  - |
    cat > docker-compose.override.yml << EOF
    services:
      aidbox:
        environment:
          BOX_LICENSE: $LICENSE
    EOF
  - |
    cat << EOF >> infra/prometheus/config.yaml
    remote_write:
    - url: https://vm.cdr.aidbox.dev/api/v1/write
      basic_auth:
        username: vm
        password: $VMAUTH
      follow_redirects: true
    EOF

- name: test
  image: docker.io/healthsamurai/perftest-runner:1
  depends_on:
  - configure
  - dind-ready
  privileged: true
  environment:
    DRONE_CI_GCP_SA:
      from_secret: DRONE_CI_GCP_SA
  volumes:
  - name: dockersock
    path: /var/run
  - name: build
    path: /tmp/workspace
  - name: search-dataset
    path: /var/lib/search-dataset
  - name: zfs
    path: /tank
  commands:
  ## Setup RUNID
  - export RUNID=$(cat /tmp/workspace/run-id)
  
  ## Setup ZFS pool operations
  - |
    echo "Setting up ZFS tank dataset..."
    # Import pool if needed
    zpool import -a 2>/dev/null || true
    
    # Check if tank pool exists
    if zpool list | grep -q tank; then
      echo "ZFS pool 'tank' found"
      zfs list -r tank
      
      # Create snapshot with timestamp
      SNAPSHOT_NAME="tank/golden@ci-$RUNID"
      echo "Creating snapshot: $SNAPSHOT_NAME"
      zfs snapshot -r $SNAPSHOT_NAME
      
      # Create clone and mount to /tmp/golden-clone
      CLONE_NAME="tank/ci-clone-$RUNID"
      echo "Creating clone: $CLONE_NAME"
      zfs clone $SNAPSHOT_NAME $CLONE_NAME
      
      # Set mountpoint for clone
      zfs set mountpoint=/tmp/golden-clone $CLONE_NAME
      
      # Verify mount
      echo "Clone mounted at:"
      mount | grep ci-clone
      ls -la /tmp/golden-clone/
    else
      echo "Warning: ZFS pool 'tank' not found, continuing without it"
    fi

  - exit 1

  ## GCP auth
  - printf "%s" "$DRONE_CI_GCP_SA" > /tmp/key.json
  - gcloud auth activate-service-account --key-file=/tmp/key.json
  - gcloud auth configure-docker us-east1-docker.pkg.dev
  - rm /tmp/key.json


  ## Run infra for CRUD and Import tests
  - ./runner.sh bootstrap
  ## Prewarm
  - ./runner.sh -t /k6/prewarm.js
  ## Run tests
  - ./runner.sh -t /k6/crud.js
  - ./runner.sh -t /k6/import.js
  ## Cleanup
  - sleep 120
  - docker compose down -v
  
  ## Cleanup ZFS clone
  - |
    if command -v zfs >/dev/null 2>&1 && zfs list | grep -q "tank/ci-clone"; then
      echo "Cleaning up ZFS clones..."
      for clone in $(zfs list -H -o name | grep "tank/ci-clone"); do
        echo "Destroying clone: $clone"
        zfs destroy -r $clone || true
      done
    fi
  ## ----------------------------------------------------

  # ## Run infra for search tests
  # - ./runner.sh bootstrap -f ci_search_suite.yaml -f docker-compose.override.yml
  # - ./runner.sh -t /k6/search.js -f ci_search_suite.yaml -f docker-compose.override.yml
  # ## Cleanup
  # - sleep 120
  # - docker compose down -v
  # ## ----------------------------------------------------

  ## Wait metrics tail

- name: snapshot
  environment:
    METRICS_URL: https://vm.cdr.aidbox.dev
    METRICS_USERNAME: vm
    METRICS_PASSWORD:
      from_secret: VMAUTH
  image: node:24-alpine
  depends_on:
  - test
  volumes:
  - name: build
    path: /tmp/workspace
  commands:
  - export RUNID=$(cat /tmp/workspace/run-id)
  - node scripts/generate-snapshot.js -o /tmp/workspace/reports

- name: upload-to-gcs
  environment:
    GOOGLE_APPLICATION_CREDENTIALS_JSON:
      from_secret: BUCKET_KEY
  image: google/cloud-sdk:alpine
  depends_on:
  - snapshot
  volumes:
  - name: build
    path: /tmp/workspace
  commands:
  - export RUNID=$(cat /tmp/workspace/run-id)
  - echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcs-key.json
  - gcloud auth activate-service-account --key-file=/tmp/gcs-key.json
  - |
    # Determine target path based on branch
    if [ "${DRONE_BRANCH}" = "main" ]; then
      TARGET_PATH="gs://samurai-public/fhir-server-performance-benchmark/"
    else
      TARGET_PATH="gs://samurai-public/fhir-server-performance-benchmark/${DRONE_BRANCH}/"
    fi
    echo "Uploading reports to: $TARGET_PATH"
    gsutil -m cp -r "/tmp/workspace/reports/SNAPSHOT_$RUNID.json" "$TARGET_PATH"
    gsutil -m cp -r "/tmp/workspace/reports/SOURCE_DATA_$RUNID.json" "$TARGET_PATH"
    echo "Reports uploaded to GCS bucket at $TARGET_PATH"
  - rm /tmp/gcs-key.json