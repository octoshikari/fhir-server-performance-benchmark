name: Deploy UI to GitHub Pages

on:
  # Run on pushes to main branch
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-ui.yml'
  
  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ui/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('ui/**/package-lock.json') }}-${{ hashFiles('ui/**.[jt]s', 'ui/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('ui/**/package-lock.json') }}-
            
      - name: Install dependencies
        run: npm ci
        working-directory: ./ui
        
      - name: Build with Next.js
        run: npm run build
        working-directory: ./ui
        env:
          NEXT_PUBLIC_BASE_PATH: /fhir-server-performance-benchmark
          
      - name: Prepare deployment files
        run: |
          # Copy any additional static files from public folder to out
          # Next.js should already copy these, but we ensure they're there
          if [ -d "./ui/public" ] && [ -d "./ui/out" ]; then
            echo "📁 Ensuring static files are in output..."
            cp -r ./ui/public/* ./ui/out/ 2>/dev/null || true
            echo "✅ Static files verified"
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ui/out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main branch
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4