configs:
  hapi:
    file: ./hapi/application.yaml

services:
  aidbox:
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 30s
      start_period: 30s

  grafana:
    image: grafana/grafana-oss
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_BASIC_ENABLED: false
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/etc/grafana/provisioning:ro

  hapi:
    image: hapiproject/hapi:latest-tomcat
    configs:
      - source: hapi
        target: /app/config/application.yaml
    depends_on:
      hapi-pg:
        condition: service_healthy
      k6-aidbox:
        condition: service_completed_successfully
    ports:
      - "8090:8080"
    volumes:
      - ./curl:/mnt:ro
    healthcheck:
      test: /mnt/curl-$$(uname -m) -f http://localhost:8080/fhir/metadata
      interval: 30s
      start_period: 30s

  hapi-pg:
    image: postgres
    depends_on:
      k6-aidbox:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: hapi
    healthcheck:
      test: pg_isready -U admin -d hapi
      interval: 3s
      start_period: 10s
    volumes:
      - hapipg:/var/lib/postgresql/data:delegated

  k6-aidbox:
    image: grafana/k6
    command:
      - run
      - -o
      - experimental-prometheus-rw
      - insert.js
      - --tag
      - testid=aidbox
    depends_on:
      aidbox:
        condition: service_healthy
    environment:
      BASE_URL: http://aidbox:8080
      AUTH_USER: root
      AUTH_PASSWORD: rE4McoPwX8
      K6_PROMETHEUS_RW_SERVER_URL: "http://prometheus:9090/api/v1/write"
      K6_PROMETHEUS_RW_STALE_MARKERS: true
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: true
    volumes:
      - ./test:/srv
    working_dir: /srv

  k6-hapi:
    image: grafana/k6
    command:
      - run
      - -o
      - experimental-prometheus-rw
      - insert.js
      - --tag
      - testid=hapi
    depends_on:
      hapi:
        condition: service_healthy
    environment:
      BASE_URL: http://hapi:8080/fhir
      K6_PROMETHEUS_RW_SERVER_URL: "http://prometheus:9090/api/v1/write"
      K6_PROMETHEUS_RW_STALE_MARKERS: true
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: true
    volumes:
      - ./test:/srv
    working_dir: /srv

  prometheus:
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=native-histograms
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver

volumes:
  hapipg: {}
